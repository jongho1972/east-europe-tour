<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동유럽 여행 코스 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f0f0f5; }

    #sidebar {
      width: 340px; min-width: 340px; background: #fff;
      display: flex; flex-direction: column;
      box-shadow: 1px 0 0 rgba(0,0,0,0.08), 4px 0 16px rgba(0,0,0,0.06); z-index: 1000; overflow: hidden;
    }
    #sidebar-header {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white; padding: 20px 16px 16px;
    }
    #sidebar-header h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; line-height: 1.35; }
    #sidebar-header p { font-size: 12px; opacity: 0.8; font-weight: 500; }

    #city-tabs { display: none; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
    .city-tab {
      padding: 10px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap; color: #8e8e93; transition: all 0.15s;
    }
    .city-tab:hover { color: #1c1c1e; background: rgba(0,0,0,0.02); }
    .city-tab.active { color: #2c3e50; border-bottom-color: #2c3e50; }
    .city-tab[data-city="budapest"].active { color: #e74c3c; border-bottom-color: #e74c3c; }
    .city-tab[data-city="vienna"].active { color: #3498db; border-bottom-color: #3498db; }
    .city-tab[data-city="prague"].active { color: #9b59b6; border-bottom-color: #9b59b6; }

    #itinerary { overflow-y: auto; flex: 1; }
    .day-card { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    .day-header {
      display: flex; align-items: center; padding: 12px 14px;
      cursor: pointer; user-select: none;
    }
    .day-header:hover { background: #f5f5f7; }
    .day-badge {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; margin-right: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .day-info { flex: 1; }
    .day-info .date { font-size: 11px; color: #8e8e93; font-weight: 400; }
    .day-info .city { font-size: 13px; font-weight: 600; color: #1c1c1e; margin-top: 1px; }
    .day-toggle { font-size: 11px; color: #c7c7cc; transition: transform 0.2s; }
    .day-toggle.open { transform: rotate(180deg); }

    .day-places { display: none; padding: 0 14px 12px 56px; }
    .day-places.open { display: block; }
    .place-item {
      display: flex; align-items: flex-start; cursor: pointer;
      border-radius: 8px; padding: 5px 6px; margin: 0 -6px; transition: background 0.15s;
    }
    .place-item:hover { background: rgba(0,122,255,0.06); }
    .place-item.active { background: rgba(0,122,255,0.1); }
    .time-badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
      margin-right: 8px; flex-shrink: 0; margin-top: 1px;
    }
    .time-am  { background: #fff3cd; color: #856404; }
    .time-pm  { background: #d1ecf1; color: #0c5460; }
    .time-eve { background: #f8d7da; color: #721c24; }
    .time-all { background: #d4edda; color: #155724; }
    .place-name { font-size: 12px; color: #1c1c1e; line-height: 1.45; }

    #map { flex: 1; }

    /* Google Maps InfoWindow 스타일 */
    .gm-style .gm-style-iw-c { border-radius: 12px !important; box-shadow: 0 4px 24px rgba(0,0,0,0.16) !important; }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .popup-content { min-width: 180px; padding: 2px 4px 4px; }
    .popup-day  { font-size: 11px; color: #8e8e93; margin-bottom: 3px; }
    .popup-name { font-size: 14px; font-weight: 700; color: #1c1c1e; margin-bottom: 4px; }
    .popup-city { font-size: 12px; font-weight: 600; }

    #legend {
      position: absolute; bottom: 30px; right: 10px; background: rgba(255,255,255,0.96);
      border-radius: 12px; padding: 10px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.06);
      z-index: 999; font-size: 11px; backdrop-filter: blur(8px);
    }
    .legend-item { display: flex; align-items: center; margin-bottom: 5px; color: #1c1c1e; font-weight: 500; }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }

    #mobile-tabs {
      display: none;
    }

    @media (max-width: 680px) {
      body { overflow: hidden; }

      /* 탭: 항상 최상단 고정 */
      #mobile-tabs {
        display: flex;
        position: fixed; top: 0; left: 0; right: 0; height: 44px;
        z-index: 9999; background: rgba(255,255,255,0.95); border-bottom: 0.5px solid rgba(0,0,0,0.1);
        backdrop-filter: blur(10px);
      }
      #tab-spacer { display: none; }
      .mobile-tab {
        flex: 1; padding: 10px; text-align: center;
        font-size: 14px; font-weight: 600; cursor: pointer;
        color: #8e8e93; border-bottom: 2px solid transparent;
      }
      .mobile-tab.active { color: #1c1c1e; border-bottom-color: #1c1c1e; }

      /* 사이드바: 탭 바로 아래 fixed, 자체 스크롤 */
      #sidebar {
        position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
        width: 100%; min-width: unset;
        overflow-y: scroll; -webkit-overflow-scrolling: touch;
        background: #fff; z-index: 100;
      }
      #itinerary {
        padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      }

      /* 지도: 기본 숨김 → show-map 시 fixed로 표시 */
      #map { display: none; }
      body.show-map #sidebar { display: none; }
      body.show-map #map {
        display: block;
        position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
        z-index: 100;
      }

      #sidebar-header { display: none; }
      #legend { bottom: 16px; }
    }

    /* ── 비밀번호 게이트 ── */
    #auth-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }
    #auth-gate .gate-card {
      background: #fff; border-radius: 16px; padding: 28px 24px;
      width: 300px; box-shadow: 0 16px 40px rgba(0,0,0,0.25);
      text-align: center;
    }
    #auth-gate h2 { font-size: 16px; font-weight: 700; color: #1c1c1e; margin-bottom: 6px; }
    #auth-gate p { font-size: 12px; color: #8e8e93; margin-bottom: 16px; }
    #auth-gate input[type="password"] {
      width: 100%; padding: 11px 13px; font-size: 15px;
      border: 1px solid #d1d1d6; border-radius: 10px; outline: none;
      margin-bottom: 10px; text-align: center; letter-spacing: 2px;
    }
    #auth-gate input[type="password"]:focus { border-color: #3498db; }
    #auth-gate button {
      width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
      background: #2c3e50; color: #fff; border: none; border-radius: 10px; cursor: pointer;
    }
    #auth-gate button:hover { background: #34495e; }
    #auth-gate .err { font-size: 12px; color: #e63946; min-height: 16px; margin-top: 6px; }
    body.auth-locked { overflow: hidden; }
    body.auth-locked #sidebar, body.auth-locked #map { visibility: hidden; }
  </style>
</head>
<body class="auth-locked">
  <div id="auth-gate">
    <div class="gate-card">
      <h2>가족 전용 페이지</h2>
      <p>비밀번호를 입력해 주세요</p>
      <form id="auth-form" autocomplete="off">
        <input type="password" id="auth-input" inputmode="numeric" autofocus />
        <button type="submit">확인</button>
        <div class="err" id="auth-err"></div>
      </form>
    </div>
  </div>
  <script>
    (function () {
      var PW = '0000';
      var form = document.getElementById('auth-form');
      var input = document.getElementById('auth-input');
      var err = document.getElementById('auth-err');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (input.value === PW) {
          document.body.classList.remove('auth-locked');
          document.getElementById('auth-gate').remove();
        } else {
          err.textContent = '죄송합니다. 접속이 제한되는 페이지입니다.';
          input.value = '';
          input.focus();
        }
      });
    })();
  </script>

function timeBadgeClass(t) {
  if (t === "오전") return "time-am";
  if (t === "오후") return "time-pm";
  if (["저녁","야간","출발","도착"].includes(t)) return "time-eve";
  return "time-all";
}

function renderSidebar(filter) {
  const container = document.getElementById("itinerary");
  container.innerHTML = "";
  DAYS.forEach(d => {
    if (filter !== "all" && d.cityKey !== filter) return;
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-header" onclick="toggleDay(${d.day})">
        <div class="day-badge" style="background:${d.color}">D${d.day}</div>
        <div class="day-info">
          <div class="date">${d.date}</div>
          <div class="city">${d.city}</div>
        </div>
        <div class="day-toggle" id="toggle-${d.day}">&#9660;</div>
      </div>
      <div class="day-places" id="places-${d.day}">
        ${d.places.map((p, i) => `
          <div class="place-item" onclick="focusPlace(${d.day}, ${i})" id="place-${d.day}-${i}">
            <span class="time-badge ${timeBadgeClass(p.time)}">${p.time}</span>
            <span class="place-name">${p.label}</span>
          </div>
        `).join("")}
      </div>
    `;
    container.appendChild(card);
  });
}

function makeIcon(color, dayNum, scale) {
  scale = scale || 1;
  const w = Math.round(38 * scale);
  const h = Math.round(46 * scale);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 38 46">
    <path d="M19 0C8.5 0 0 8.5 0 19c0 14.3 19 27 19 27S38 33.3 38 19C38 8.5 29.5 0 19 0z" fill="${color}" stroke="white" stroke-width="1.5"/>
    <text x="19" y="23" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial">D${dayNum}</text>
  </svg>`;
  return {
    url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    scaledSize: new google.maps.Size(w, h),
    anchor: new google.maps.Point(Math.round(w / 2), h),
  };
}

function setLineStyle(r, state) {
  if (r.dash) {
    const opacityMap = { normal: 0.7, highlighted: 1.0, dimmed: 0.08 };
    const scaleMap   = { normal: 3,   highlighted: 4,   dimmed: 2    };
    r.line.setOptions({
      icons: [{
        icon: {
          path: "M 0,-1 0,1",
          strokeOpacity: opacityMap[state],
          scale: scaleMap[state],
          strokeColor: r.color,
        },
        offset: "0",
        repeat: "15px",
      }],
    });
  } else {
    const opacityMap = { normal: 0.7, highlighted: 1.0, dimmed: 0.08 };
    const weightMap  = { normal: 2.5, highlighted: 5,   dimmed: 2    };
    r.line.setOptions({
      strokeOpacity: opacityMap[state],
      strokeWeight:  weightMap[state],
    });
  }
}

function highlightDay(dayNum) {
  activeHighlightDay = dayNum;
  allMarkers.forEach(m => {
    if (m._dayNum === dayNum) {
      m.setOpacity(1);
      m.setIcon(makeIcon(m._color, m._dayNum, 1.25));
      m.setZIndex(1000);
    } else {
      m.setOpacity(0.15);
      m.setIcon(makeIcon(m._color, m._dayNum, 1));
      m.setZIndex(1);
    }
  });
  routeLines.forEach(r => {
    setLineStyle(r, r.days.includes(dayNum) ? "highlighted" : "dimmed");
  });
}

function resetHighlight() {
  activeHighlightDay = null;
  allMarkers.forEach(m => {
    m.setOpacity(1);
    m.setIcon(makeIcon(m._color, m._dayNum, 1));
    m.setZIndex(1);
  });
  routeLines.forEach(r => setLineStyle(r, "normal"));
}

function toggleDay(dayNum) {
  const places = document.getElementById("places-" + dayNum);
  const toggle = document.getElementById("toggle-" + dayNum);
  const isOpen = places.classList.contains("open");
  if (isOpen && activeHighlightDay === dayNum) {
    places.classList.remove("open");
    toggle.classList.remove("open");
    resetHighlight();
    return;
  }
  places.classList.toggle("open", !isOpen);
  toggle.classList.toggle("open", !isOpen);
  if (!isOpen) {
    highlightDay(dayNum);
    const d = DAYS.find(x => x.day === dayNum);
    if (d && d.places.length > 0 && map) {
      map.panTo({ lat: d.places[0].lat, lng: d.places[0].lng });
      map.setZoom(14);
    }
    setTimeout(() => {
      const placesEl = document.getElementById("places-" + dayNum);
      if (placesEl) placesEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 50);
  } else {
    resetHighlight();
  }
}


function focusPlace(dayNum, placeIdx) {
  document.querySelectorAll(".place-item").forEach(el => el.classList.remove("active"));
  const el = document.getElementById("place-" + dayNum + "-" + placeIdx);
  if (el) { el.classList.add("active"); el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
  const d = DAYS.find(x => x.day === dayNum);
  if (!d) return;
  const p = d.places[placeIdx];
  if (map) {
    map.panTo({ lat: p.lat, lng: p.lng });
    map.setZoom(15);
  }
  const marker = allMarkers.find(m => m._dayNum === dayNum && m._placeIdx === placeIdx);
  if (marker) {
    infoWindow.setContent(`<div class="popup-content">
      <div class="popup-day">Day ${d.day} &middot; ${d.date}</div>
      <div class="popup-name">${p.label}</div>
      <div class="popup-city" style="color:${d.color}">${d.city}</div>
    </div>`);
    infoWindow.open(map, marker);
  }
}

function createMap() {
  if (mapReady) return;
  mapReady = true;
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 48.5, lng: 15.5 },
    zoom: 6,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });

  infoWindow  = new google.maps.InfoWindow();
  tooltipWindow = new google.maps.InfoWindow({ disableAutoPan: true });

  // 마커 생성
  DAYS.forEach(d => {
    d.places.forEach((p, i) => {
      const marker = new google.maps.Marker({
        position: { lat: p.lat, lng: p.lng },
        map,
        icon: makeIcon(d.color, d.day),
        title: p.label,
      });
      marker._dayNum   = d.day;
      marker._placeIdx = i;
      marker._color    = d.color;

      marker.addListener("click", () => {
        infoWindow.setContent(`<div class="popup-content">
          <div class="popup-day">Day ${d.day} &middot; ${d.date}</div>
          <div class="popup-name">${p.label}</div>
          <div class="popup-city" style="color:${d.color}">${d.city}</div>
        </div>`);
        infoWindow.open(map, marker);

        document.querySelectorAll(".place-item").forEach(el => el.classList.remove("active"));
        const el = document.getElementById("place-" + d.day + "-" + i);
        if (el) { el.classList.add("active"); el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
        const placesEl = document.getElementById("places-" + d.day);
        const toggleEl = document.getElementById("toggle-" + d.day);
        if (placesEl && !placesEl.classList.contains("open")) {
          placesEl.classList.add("open");
          if (toggleEl) toggleEl.classList.add("open");
        }
      });

      allMarkers.push(marker);
    });
  });

  // 이동 경로 선
  const routeData = [
    { pts: [[47.4979,19.0402],[48.2082,16.3738]], color:"#95a5a6", dash:false, tip:"부다페스트 → 비엔나 (기차)",                     days:[3] },
    { pts: [[48.2082,16.3738],[47.8095,13.0550]], color:"#95a5a6", dash:false, tip:"빈 → 잘츠부르크 (기차)",                          days:[6] },
    { pts: [[47.8095,13.0550],[47.5622,13.6493]], color:"#3498db", dash:true,  tip:"잘츠부르크 ↔ 할슈타트 (현지 투어)",                days:[6] },
    { pts: [[47.8095,13.0550],[48.8127,14.3175]], color:"#95a5a6", dash:true,  tip:"잘츠부르크 → 체스키크룸로프 (CK셔틀)",            days:[7] },
    { pts: [[48.8127,14.3175],[50.0755,14.4378]], color:"#9b59b6", dash:false, tip:"체스키크룸로프 → 프라하",                         days:[8] },
  ];

  routeData.forEach(r => {
    const path = r.pts.map(pt => ({ lat: pt[0], lng: pt[1] }));
    const options = {
      path,
      strokeColor: r.color,
      strokeWeight: 2.5,
      map,
    };
    if (r.dash) {
      options.strokeOpacity = 0;
      options.icons = [{
        icon: { path: "M 0,-1 0,1", strokeOpacity: 0.7, scale: 3, strokeColor: r.color },
        offset: "0",
        repeat: "15px",
      }];
    } else {
      options.strokeOpacity = 0.7;
    }
    r.line = new google.maps.Polyline(options);

    r.line.addListener("mouseover", e => {
      tooltipWindow.setContent(`<div style="font-size:12px;padding:2px 4px">${r.tip}</div>`);
      tooltipWindow.setPosition(e.latLng);
      tooltipWindow.open(map);
    });
    r.line.addListener("mouseout", () => tooltipWindow.close());

    routeLines.push(r);
  });

  // 도시 탭 필터
  document.querySelectorAll(".city-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".city-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const city = tab.dataset.city;
      resetHighlight();
      renderSidebar(city);
      const views = {
        all:      { center:{ lat:48.5,    lng:15.5   }, zoom:6  },
        budapest: { center:{ lat:47.5050, lng:19.0550 }, zoom:13 },
        vienna:   { center:{ lat:48.2000, lng:16.3650 }, zoom:13 },
        prague:   { center:{ lat:50.0870, lng:14.4200 }, zoom:13 },
      };
      const v = views[city] || views.all;
      map.panTo(v.center);
      map.setZoom(v.zoom);
    });
  });

  renderSidebar("all");
}

function initMap() {
  // 데스크탑: 즉시 초기화 / 모바일: 지도 탭 클릭 시 지연 초기화
  if (window.innerWidth > 680) {
    createMap();
  } else {
    renderSidebar("all");
  }
}

function switchMobileTab(tab) {
  const tabs = document.querySelectorAll(".mobile-tab");
  if (tab === "map") {
    document.body.classList.add("show-map");
    tabs[0].classList.remove("active");
    tabs[1].classList.add("active");
    // CSS 적용 후 충분한 시간 대기 (Google Maps가 fixed 컨테이너 크기를 정확히 인식)
    setTimeout(() => {
      if (!mapReady) {
        createMap();
      } else {
        google.maps.event.trigger(map, "resize");
        if (activeHighlightDay) {
          const d = DAYS.find(x => x.day === activeHighlightDay);
          if (d && d.places.length > 0) {
            map.panTo({ lat: d.places[0].lat, lng: d.places[0].lng });
            map.setZoom(14);
          }
        } else {
          map.setCenter({ lat: 48.5, lng: 15.5 });
          map.setZoom(6);
        }
      }
    }, 200);
  } else {
    document.body.classList.remove("show-map");
    tabs[0].classList.add("active");
    tabs[1].classList.remove("active");
  }
}
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBQ0NDsC42O-xsOUCZ26Gz-F2c0iDdicRs&callback=initMap&loading=async"></script>
